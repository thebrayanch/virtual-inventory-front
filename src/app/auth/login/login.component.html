<div class="auth-container">
  <div class="auth-card">
    <h2>Iniciar Sesión</h2>

    <p class="auth-subtitle">Ingresa tus credenciales para acceder</p>

    @if (error) {
      <p-message severity="error">{{ error }}</p-message>
    }

    <form #form="ngForm" (ngSubmit)="submit()">
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input id="email" type="email" pInputText [(ngModel)]="email" name="email" required autocomplete="email" />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <p-password
          id="password"
          [(ngModel)]="password"
          name="password"
          [feedback]="false"
          [toggleMask]="true"
          required
        />
      </div>

      <p-button type="submit" label="Entrar" [loading]="loading" styleClass="w-full" />
    </form>

    <p class="auth-link">
      ¿No tienes cuenta?
      <a routerLink="/register">Regístrate</a>
    </p>
  </div>
</div>
