<div class="auth-container">
  <div class="auth-card">
    <h2>Iniciar Sesión</h2>

    <p class="auth-subtitle">Ingresa tus credenciales para acceder</p>

    @if (error) {
      <p-message severity="error">{{ error }}</p-message>
    }

    <form #form="ngForm" (ngSubmit)="submit()">
      <div class="field">
        <label for="username">Nombre de usuario</label>
        <input id="username" type="text" pInputText [(ngModel)]="username" name="username" required autocomplete="username" />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <p-password
          id="password"
          [(ngModel)]="password"
          name="password"
          [feedback]="false"
          [toggleMask]="true"
          required
        />
      </div>

      <p-button type="submit" label="Entrar" [loading]="loading" styleClass="w-full" />
    </form>


  </div>
</div>
