<div class="auth-container">
  <div class="auth-card">
    <h2>Crear Cuenta</h2>

    <p class="auth-subtitle">Completa tus datos para registrarte</p>

    @if (error) {
      <p-message severity="error">{{ error }}</p-message>
    }

    <form #form="ngForm" (ngSubmit)="submit()">
      <div class="field">
        <label for="name">Nombre completo</label>
        <input id="name" type="text" pInputText [(ngModel)]="name" name="name" required />
      </div>

      <div class="field">
        <label for="email">Correo electrónico</label>
        <input id="email" type="email" pInputText [(ngModel)]="email" name="email" required autocomplete="email" />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <p-password id="password" [(ngModel)]="password" name="password" [toggleMask]="true" required />
      </div>

      <div class="field">
        <label for="confirmPassword">Confirmar contraseña</label>
        <p-password
          id="confirmPassword"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          [feedback]="false"
          [toggleMask]="true"
          required
        />
      </div>

      <p-button type="submit" label="Registrarse" [loading]="loading" styleClass="w-full" />
    </form>

    <p class="auth-link">
      ¿Ya tienes cuenta?
      <a routerLink="/login">Inicia sesión</a>
    </p>
  </div>
</div>
